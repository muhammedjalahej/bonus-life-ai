name: Build Base Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'app/backend/requirements-prod.txt'
      - 'app/backend/Dockerfile.base'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/backend/Dockerfile.base
          push: true
          tags: ghcr.io/muhammedjalahej/bonus-life-ai:base
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Railway deployment
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"21b8546a-1298-4ee3-9c68-9a3ad82b0bb2\", environmentId: \"184703d8-d1bd-4456-b48d-1be20e531577\") }"}' || true
